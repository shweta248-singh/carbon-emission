version: '3.8'

services:
  mongodb:
    image: mongo:6-jammy # Use specific stable version
    # Do NOT expose mongodb to the public
    expose:
      - "27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - carbontrace-net
    restart: always

  optimizer:
    build: ./optimizer-engine
    expose:
      - "8000"
    environment:
      - PORT=8000
    networks:
      - carbontrace-net
    restart: always

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - optimizer
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/carbon-tracker
      - OPTIMIZER_URL=http://optimizer:8000
    networks:
      - carbontrace-net
    restart: always

  frontend:
    build: ./frontend
    ports:
      - "80:80" # Standard production port
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - carbontrace-net
    restart: always

networks:
  carbontrace-net:
    driver: bridge

volumes:
  mongodb_data:
